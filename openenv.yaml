name: spacecraft-rendezvous
version: 1.0.0
description: >
  Train LLM agents for autonomous spacecraft proximity operations.
  Uses Clohessy-Wiltshire-Hill (CWH) physics — the same model used in 
  real NASA mission planning. Inspired by the APIARY/Astrobee ISS 
  experiment (NRL, May 2025). Agent learns rendezvous and docking under 
  fuel constraints, sensor noise, and communication blackouts.

entry_point: server.app:app
port: 7860

environment:
  theme: "World Modeling — Professional Tasks (Theme 3.1)"
  domain: aerospace
  physics: CWH relative motion equations
  action_space: continuous (fx, fy thrust forces + reasoning text)
  observation_space: partial (noisy LVLH position/velocity, blacked out during comms loss)
  reward: shaped (5-component: approach + fuel + LOS + blackout + terminal)
  difficulty_levels:
    - warm_start
    - easy
    - medium
    - hard

training:
  recommended_algorithm: GRPO
  recommended_model: Qwen/Qwen2.5-1.5B-Instruct
  framework: Unsloth + HuggingFace TRL
  notebook: training/spacecraft_grpo_colab.ipynb

real_world_references:
  - "APIARY/Astrobee ISS experiment — NRL, May 2025"
  - "InnoCube/LeLaR CubeSat in-orbit RL — January 2025"
  - "ESA ClearSpace-1 debris removal mission"
  - "ISRO SPADEX docking demonstration"
